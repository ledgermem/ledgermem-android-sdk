name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate-wrapper:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/wrapper-validation-action@v3

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: validate-wrapper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v3
      - name: Run unit tests
        run: ./gradlew :library:test --no-daemon --stacktrace
